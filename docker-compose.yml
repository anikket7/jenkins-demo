version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - DOCKER_HOST=tcp://docker:2375
    depends_on:
      - docker
    networks:
      - jenkins-network

  docker:
    image: docker:dind
    privileged: true
    ports:
      - "2375:2375"
    volumes:
      - docker_data:/var/lib/docker
    networks:
      - jenkins-network

volumes:
  jenkins_home:
  docker_data:

networks:
  jenkins-network:
    driver: bridge
